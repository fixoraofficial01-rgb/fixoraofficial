<!-- index.html -->

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fixora</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar">

        <div class="logo">
            FIXORA
        </div>

        <ul class="nav-links">

            <li>Home</li>

            <li>Services</li>

            <li onclick="showAdmin()">
                Admin Dashboard
            </li>

            <li>Contact</li>

        </ul>

    </nav>


    <!-- HERO SECTION -->

    <section class="hero">

        <h1>
            Book Trusted Painters Near You
        </h1>

        <p>
            Verified nearby painters for fast and professional service.
        </p>

    </section>


    <!-- LOGIN ROLE -->

    <section class="role-login">

        <h2>
            Select Login Role
        </h2>

        <div class="role-buttons">

            <button onclick="showCustomer()">
                Customer
            </button>

            <button onclick="showPainter()">
                Painter
            </button>

        </div>

    </section>


    <!-- CUSTOMER SECTION -->

    <section class="booking-form" id="customerSection">

        <h2>
            Book A Painter
        </h2>

        <form id="bookingForm">

            <input
                type="text"
                name="name"
                placeholder="Customer Name"
                required
            >

            <input
                type="tel"
                name="mobile"
                placeholder="Mobile Number"
                required
            >

            <input
                type="text"
                name="address"
                placeholder="Address"
                required
            >

            <textarea
                name="work"
                placeholder="Describe Painting Work"
            ></textarea>

            <select name="materials">

                <option>
                    Need Materials?
                </option>

                <option>
                    Yes
                </option>

                <option>
                    No
                </option>

            </select>

            <button type="submit">
                Submit Booking
            </button>

        </form>

    </section>


    <!-- PAINTER SECTION -->

    <section class="painter-section" id="painterSection">

        <h2>
            Painter Login
        </h2>

        <form id="loginForm">

            <input
                type="tel"
                id="loginMobile"
                placeholder="Enter Painter Mobile Number"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <div id="painterWorks"></div>

    </section>


    <!-- ADMIN SECTION -->

    <section class="admin-section" id="adminSection">

        <h2>
            Admin Dashboard
        </h2>

        <form id="painterForm">

            <input
                type="text"
                name="name"
                placeholder="Painter Name"
                required
            >

            <input
                type="tel"
                name="mobile"
                placeholder="Painter Mobile"
                required
            >

            <input
                type="text"
                name="experience"
                placeholder="Experience"
                required
            >

            <input
                type="text"
                name="area"
                placeholder="Area"
                required
            >

            <select name="radius">

                <option>
                    Service Radius
                </option>

                <option>
                    3 KM
                </option>

                <option>
                    5 KM
                </option>

                <option>
                    10 KM
                </option>

            </select>

            <button type="submit">
                Register Painter
            </button>

        </form>

        <div id="bookingsContainer"></div>

    </section>


    <script type="module" src="script.js"></script>

</body>

</html>
